name: Oracle A1 Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: oracle-a1-watchdog
  cancel-in-progress: true

jobs:
  watchdog:
    name: Check Oracle A1 retry automation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check latest retry run and wake it if stale
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
          WATCHDOG_RUN_ID: ${{ github.run_id }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -euo pipefail

          WORKFLOW_FILE="oracle-a1-retry.yml"
          STALE_SECONDS=720
          NOW_TS="$(date +%s)"
          WATCHDOG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${WATCHDOG_RUN_ID}"

          send_telegram() {
            local text="$1"
            local response_file
            local http_code

            if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
              echo "::warning::Telegram secrets TG_BOT_TOKEN or TG_CHAT_ID are empty."
              return 0
            fi

            response_file="$(mktemp)"

            if ! http_code="$(curl -sS -o "$response_file" -w "%{http_code}" \
              -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${text}")"; then
              echo "::warning::Telegram request failed before receiving an HTTP response."
              cat "$response_file" || true
              rm -f "$response_file"
              return 0
            fi

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "Telegram notification sent."
            else
              echo "::warning::Telegram notification failed with HTTP $http_code."
              cat "$response_file" || true
            fi

            rm -f "$response_file"
          }

          send_telegram_lines() {
            local text
            text="$(printf '%s\n' "$@")"
            send_telegram "$text"
          }

          api_get() {
            local path="$1"
            curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}${path}"
          }

          api_post() {
            local path="$1"
            local body="$2"
            curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "$body" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}${path}"
          }

          api_get "/actions/runs?per_page=30" > /tmp/runs.json

          python3 - <<'PY' > /tmp/watchdog.env
          import json
          from datetime import datetime

          with open("/tmp/runs.json", "r", encoding="utf-8") as handle:
              runs = json.load(handle).get("workflow_runs", [])

          retry_runs = [
              run for run in runs
              if run.get("path") == ".github/workflows/oracle-a1-retry.yml"
          ]

          latest = retry_runs[0] if retry_runs else {}
          active = [
              run for run in retry_runs
              if run.get("status") in {"queued", "pending", "in_progress", "waiting", "requested"}
          ]

          def parse_ts(value):
              if not value:
                  return 0
              return int(datetime.fromisoformat(value.replace("Z", "+00:00")).timestamp())

          latest_started = parse_ts(latest.get("run_started_at") or latest.get("created_at"))
          latest_updated = parse_ts(latest.get("updated_at") or latest.get("run_started_at") or latest.get("created_at"))

          print(f'LATEST_RUN_NUMBER={latest.get("run_number", 0)}')
          print(f'LATEST_STATUS={latest.get("status", "none")}')
          print(f'LATEST_CONCLUSION={latest.get("conclusion") or ""}')
          print(f'LATEST_EVENT={latest.get("event", "")}')
          print(f'LATEST_STARTED_TS={latest_started}')
          print(f'LATEST_UPDATED_TS={latest_updated}')
          print(f'LATEST_URL={latest.get("html_url", "")}')
          print(f'ACTIVE_RETRY_RUNS={len(active)}')
          PY

          . /tmp/watchdog.env

          LAST_TS="${LATEST_STARTED_TS:-0}"
          if [ "${LATEST_UPDATED_TS:-0}" -gt "$LAST_TS" ]; then
            LAST_TS="$LATEST_UPDATED_TS"
          fi

          if [ "$LAST_TS" -le 0 ]; then
            AGE_SECONDS=999999
          else
            AGE_SECONDS=$((NOW_TS - LAST_TS))
          fi

          echo "Latest retry run: #${LATEST_RUN_NUMBER} status=${LATEST_STATUS} age=${AGE_SECONDS}s active=${ACTIVE_RETRY_RUNS}"

          if [ "${ACTIVE_RETRY_RUNS:-0}" -gt 0 ]; then
            echo "Retry workflow is currently active. Nothing to wake."
            exit 0
          fi

          if [ "$AGE_SECONDS" -lt "$STALE_SECONDS" ]; then
            echo "Retry workflow is fresh enough. Nothing to wake."
            exit 0
          fi

          api_post "/actions/workflows/${WORKFLOW_FILE}/dispatches" '{"ref":"main"}'

          send_telegram_lines \
            "🛡️ Oracle Auto Watchdog: atraso detectado" \
            "Status: workflow principal estava parado/atrasado" \
            "Último ciclo: #${LATEST_RUN_NUMBER}" \
            "Último status: ${LATEST_STATUS} ${LATEST_CONCLUSION}" \
            "Tempo desde última atividade: ${AGE_SECONDS}s" \
            "Ação: disparei o workflow principal novamente" \
            "Último run: ${LATEST_URL}" \
            "Watchdog: ${WATCHDOG_URL}"
