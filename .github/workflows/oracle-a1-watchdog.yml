name: Oracle A1 Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: oracle-a1-watchdog
  cancel-in-progress: true

jobs:
  watchdog:
    name: Keep Oracle A1 Hunter alive
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check Hunter and dispatch if needed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          WATCHDOG_RUN_ID: ${{ github.run_id }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -euo pipefail

          HUNTER_WORKFLOW_FILE="oracle-a1-hunter.yml"
          STALE_SECONDS=900
          NOW_TS="$(date +%s)"
          WATCHDOG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${WATCHDOG_RUN_ID}"

          send_telegram() {
            local text="$1"
            local response_file
            local http_code

            if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
              echo "::warning::Telegram secrets TG_BOT_TOKEN or TG_CHAT_ID are empty."
              return 0
            fi

            response_file="$(mktemp)"
            if ! http_code="$(curl -sS -o "$response_file" -w "%{http_code}" \
              -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${text}")"; then
              echo "::warning::Telegram request failed before receiving an HTTP response."
              cat "$response_file" || true
              rm -f "$response_file"
              return 0
            fi

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "Telegram notification sent."
            else
              echo "::warning::Telegram notification failed with HTTP $http_code."
              cat "$response_file" || true
            fi

            rm -f "$response_file"
          }

          send_telegram_lines() {
            local text
            text="$(printf '%s\n' "$@")"
            send_telegram "$text"
          }

          api_get() {
            local path="$1"
            curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}${path}"
          }

          api_post() {
            local path="$1"
            local body="$2"
            curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "$body" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}${path}"
          }

          api_get "/actions/runs?per_page=50" > /tmp/runs.json

          python3 - <<'PY' > /tmp/watchdog.env
          import json
          from datetime import datetime

          with open("/tmp/runs.json", "r", encoding="utf-8") as handle:
              runs = json.load(handle).get("workflow_runs", [])

          hunter_runs = [
              run for run in runs
              if run.get("path") == ".github/workflows/oracle-a1-hunter.yml"
          ]

          active = [
              run for run in hunter_runs
              if run.get("status") in {"queued", "pending", "in_progress", "waiting", "requested"}
          ]

          latest = hunter_runs[0] if hunter_runs else {}

          def parse_ts(value):
              if not value:
                  return 0
              return int(datetime.fromisoformat(value.replace("Z", "+00:00")).timestamp())

          latest_ts = parse_ts(latest.get("updated_at") or latest.get("run_started_at") or latest.get("created_at"))

          print(f'ACTIVE_HUNTERS={len(active)}')
          print(f'LATEST_RUN_NUMBER={latest.get("run_number", 0)}')
          print(f'LATEST_STATUS={latest.get("status", "none")}')
          print(f'LATEST_CONCLUSION={latest.get("conclusion") or ""}')
          print(f'LATEST_UPDATED_TS={latest_ts}')
          print(f'LATEST_URL={latest.get("html_url", "")}')
          PY

          . /tmp/watchdog.env

          if [ "${ACTIVE_HUNTERS:-0}" -gt 0 ]; then
            echo "Hunter is active. Nothing to dispatch."
            exit 0
          fi

          if [ "${LATEST_UPDATED_TS:-0}" -le 0 ]; then
            AGE_SECONDS=999999
          else
            AGE_SECONDS=$((NOW_TS - LATEST_UPDATED_TS))
          fi

          echo "Latest hunter: #${LATEST_RUN_NUMBER} ${LATEST_STATUS} ${LATEST_CONCLUSION}, age=${AGE_SECONDS}s."

          if [ "$AGE_SECONDS" -lt "$STALE_SECONDS" ]; then
            echo "Hunter is fresh enough. Nothing to dispatch."
            exit 0
          fi

          api_post "/actions/workflows/${HUNTER_WORKFLOW_FILE}/dispatches" '{"ref":"main"}'

          send_telegram_lines \
            "🛡️ Oracle A1 Watchdog: Hunter reacendido" \
            "Motivo: não havia Hunter ativo há mais de ${STALE_SECONDS}s" \
            "Último Hunter: #${LATEST_RUN_NUMBER} ${LATEST_STATUS} ${LATEST_CONCLUSION}" \
            "Idade da última atividade: ${AGE_SECONDS}s" \
            "Ação: disparei oracle-a1-hunter.yml" \
            "Último Hunter: ${LATEST_URL}" \
            "Watchdog: ${WATCHDOG_URL}"
