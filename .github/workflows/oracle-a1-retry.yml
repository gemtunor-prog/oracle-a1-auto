name: Oracle A1 Auto Retry

on:
  workflow_dispatch:
    inputs:
      ocpus:
        description: "OCPUs da A1 Flex"
        required: false
        default: ""
      memory_gb:
        description: "RAM em GB da A1 Flex"
        required: false
        default: ""
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: oracle-a1-auto-retry
  cancel-in-progress: false

jobs:
  create-oracle-a1:
    name: Try create Oracle A1
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install OCI CLI
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user --upgrade oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/oci" --version

      - name: Configure OCI
        shell: bash
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          missing=0
          for name in OCI_USER_OCID OCI_TENANCY_OCID OCI_FINGERPRINT OCI_PRIVATE_KEY OCI_REGION OCI_SSH_PUBLIC_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing secret::$name is empty or not configured."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          mkdir -p "$HOME/.oci"

          printf '%s' "$OCI_PRIVATE_KEY" | sed 's/\\n/\n/g' > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"

          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          key_file=${HOME}/.oci/oci_api_key.pem
          EOF

          chmod 600 "$HOME/.oci/config"
          printf '%s' "$OCI_SSH_PUBLIC_KEY" > /tmp/sshkey.pub

          oci iam region list --auth api_key --output table >/dev/null
          echo "OCI CLI configured."

      - name: Build hourly Telegram heartbeat key
        id: heartbeat
        shell: bash
        run: |
          set -euo pipefail
          echo "key=oracle-a1-heartbeat-$(date -u +%Y%m%d%H)" >> "$GITHUB_OUTPUT"

      - name: Restore hourly Telegram heartbeat marker
        id: heartbeat-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/oracle-a1-heartbeat-marker
          key: ${{ steps.heartbeat.outputs.key }}
          lookup-only: true

      - name: Send Telegram start or hourly heartbeat
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEARTBEAT_CACHE_HIT: ${{ steps.heartbeat-cache.outputs.cache-hit }}
          OCI_DISPLAY_NAME: ${{ secrets.OCI_DISPLAY_NAME }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_GB: ${{ secrets.OCI_MEMORY_GB }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -euo pipefail

          send_telegram() {
            local text="$1"

            if [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ]; then
              curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                -d "chat_id=${TG_CHAT_ID}" \
                --data-urlencode "text=${text}" >/dev/null || true
            fi
          }

          DISPLAY_NAME="${OCI_DISPLAY_NAME:-oracle-a1-auto}"
          OCPUS="${OCI_OCPUS:-1}"
          MEMORY_GB="${OCI_MEMORY_GB:-6}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            send_telegram "Oracle Auto: workflow iniciado manualmente.
          Nome: $DISPLAY_NAME
          Tentativas: a cada 5 minutos
          Shape: VM.Standard.A1.Flex
          OCPUs: $OCPUS
          RAM: ${MEMORY_GB}GB"
          elif [ "${HEARTBEAT_CACHE_HIT:-false}" != "true" ]; then
            send_telegram "Oracle Auto: ainda rodando.
          Tentando criar a A1 a cada 5 minutos.
          Nome: $DISPLAY_NAME
          Shape: VM.Standard.A1.Flex"
            echo "sent=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/oracle-a1-heartbeat-marker
          else
            echo "Hourly Telegram heartbeat already sent."
          fi

      - name: Save hourly Telegram heartbeat marker
        if: ${{ github.event_name == 'schedule' && steps.heartbeat-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: /tmp/oracle-a1-heartbeat-marker
          key: ${{ steps.heartbeat.outputs.key }}

      - name: Try create Oracle A1 Flex instance
        shell: bash
        env:
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_AD: ${{ secrets.OCI_AD }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_DISPLAY_NAME: ${{ secrets.OCI_DISPLAY_NAME }}
          SECRET_OCPUS: ${{ secrets.OCI_OCPUS }}
          SECRET_MEMORY_GB: ${{ secrets.OCI_MEMORY_GB }}
          INPUT_OCPUS: ${{ github.event.inputs.ocpus || '' }}
          INPUT_MEMORY_GB: ${{ github.event.inputs.memory_gb || '' }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set +e
          set -uo pipefail

          SHAPE="VM.Standard.A1.Flex"
          DISPLAY_NAME="${OCI_DISPLAY_NAME:-oracle-a1-auto}"
          OCPUS="${INPUT_OCPUS:-${SECRET_OCPUS:-1}}"
          MEMORY_GB="${INPUT_MEMORY_GB:-${SECRET_MEMORY_GB:-6}}"

          send_telegram() {
            local text="$1"

            if [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ]; then
              curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                -d "chat_id=${TG_CHAT_ID}" \
                --data-urlencode "text=${text}" >/dev/null || true
            fi
          }

          fail_required() {
            local message="$1"
            echo "::error::$message"
            send_telegram "Oracle Auto: $message"
            exit 1
          }

          for name in OCI_COMPARTMENT_ID OCI_AD OCI_SUBNET_ID OCI_REGION; do
            if [ -z "${!name:-}" ]; then
              fail_required "$name is empty or not configured."
            fi
          done

          if [ ! -s /tmp/sshkey.pub ]; then
            fail_required "OCI_SSH_PUBLIC_KEY is empty or not configured."
          fi

          if ! [[ "$OCPUS" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            fail_required "OCI_OCPUS/input ocpus must be numeric. Current value: $OCPUS"
          fi

          if ! [[ "$MEMORY_GB" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            fail_required "OCI_MEMORY_GB/input memory_gb must be numeric. Current value: $MEMORY_GB"
          fi

          SHAPE_CONFIG="{\"ocpus\":${OCPUS},\"memoryInGBs\":${MEMORY_GB}}"

          echo "Region: $OCI_REGION"
          echo "Display name: $DISPLAY_NAME"
          echo "Shape: $SHAPE"
          echo "OCPUs: $OCPUS"
          echo "Memory: ${MEMORY_GB}GB"

          echo "Checking for an existing running instance with the same display name..."
          EXISTING_RUNNING=$(oci compute instance list \
            --region "$OCI_REGION" \
            --compartment-id "$OCI_COMPARTMENT_ID" \
            --display-name "$DISPLAY_NAME" \
            --lifecycle-state RUNNING \
            --query "data[0].id" \
            --raw-output 2>/dev/null || true)

          if [ -n "$EXISTING_RUNNING" ] && [ "$EXISTING_RUNNING" != "null" ]; then
            echo "Instance already running: $EXISTING_RUNNING"
            send_telegram "Oracle Auto: instance already running.
          Name: $DISPLAY_NAME
          Instance OCID:
          $EXISTING_RUNNING"
            exit 0
          fi

          EXISTING_PROVISIONING=$(oci compute instance list \
            --region "$OCI_REGION" \
            --compartment-id "$OCI_COMPARTMENT_ID" \
            --display-name "$DISPLAY_NAME" \
            --lifecycle-state PROVISIONING \
            --query "data[0].id" \
            --raw-output 2>/dev/null || true)

          if [ -n "$EXISTING_PROVISIONING" ] && [ "$EXISTING_PROVISIONING" != "null" ]; then
            echo "Instance already provisioning: $EXISTING_PROVISIONING"
            exit 0
          fi

          find_platform_image() {
            local version="$1"

            oci compute image list \
              --region "$OCI_REGION" \
              --compartment-id "$OCI_COMPARTMENT_ID" \
              --operating-system "Oracle Linux" \
              --operating-system-version "$version" \
              --shape "$SHAPE" \
              --sort-by TIMECREATED \
              --sort-order DESC \
              --query "data[0].id" \
              --raw-output 2>/tmp/image_error.log || true
          }

          IMAGE_ID="${OCI_IMAGE_ID:-}"

          if [ -z "$IMAGE_ID" ]; then
            echo "OCI_IMAGE_ID not configured. Searching for an Oracle Linux 9 A1-compatible image..."
            IMAGE_ID="$(find_platform_image "9")"

            if [ -z "$IMAGE_ID" ] || [ "$IMAGE_ID" = "null" ]; then
              echo "Oracle Linux 9 image not found. Trying Oracle Linux 8..."
              IMAGE_ID="$(find_platform_image "8")"
            fi

            if [ -z "$IMAGE_ID" ] || [ "$IMAGE_ID" = "null" ]; then
              echo "Could not find an Oracle Linux 9 or 8 A1-compatible image."
              cat /tmp/image_error.log || true
              send_telegram "Oracle Auto: could not find an automatic Oracle Linux 9 or 8 IMAGE_ID for $SHAPE."
              exit 1
            fi
          fi

          echo "Image ID: $IMAGE_ID"

          try_launch() {
            local fault_domain="${1:-}"
            local output
            local code

            echo "Trying to create instance. Fault domain: ${fault_domain:-none}"

            args=(
              compute instance launch
              --region "$OCI_REGION"
              --availability-domain "$OCI_AD"
              --compartment-id "$OCI_COMPARTMENT_ID"
              --shape "$SHAPE"
              --shape-config "$SHAPE_CONFIG"
              --subnet-id "$OCI_SUBNET_ID"
              --image-id "$IMAGE_ID"
              --ssh-authorized-keys-file /tmp/sshkey.pub
              --assign-public-ip true
              --display-name "$DISPLAY_NAME"
              --query "data.id"
              --raw-output
            )

            if [ -n "$fault_domain" ]; then
              args+=(--fault-domain "$fault_domain")
            fi

            output="$(oci "${args[@]}" 2>&1)"
            code=$?

            echo "$output"

            if [ "$code" -eq 0 ] && echo "$output" | grep -q "ocid1.instance"; then
              send_telegram "Oracle A1 created successfully.
          Name: $DISPLAY_NAME
          Shape: $SHAPE
          OCPUs: $OCPUS
          RAM: ${MEMORY_GB}GB
          Fault domain: ${fault_domain:-none}
          Instance OCID:
          $output"
              exit 0
            fi

            if echo "$output" | grep -Eiq "Out of capacity|Out of host capacity|capacity"; then
              echo "No capacity available yet."
              return 0
            fi

            if echo "$output" | grep -Eiq "NotAuthorized|Authorization|InvalidParameter|LimitExceeded|quota|ServiceError|Forbidden|FaultDomain"; then
              send_telegram "Oracle Auto: non-capacity error:
          $(echo "$output" | head -c 1800)"
              return 0
            fi

            return 0
          }

          try_launch ""
          sleep 5

          try_launch "FAULT-DOMAIN-1"
          sleep 5

          try_launch "FAULT-DOMAIN-2"
          sleep 5

          try_launch "FAULT-DOMAIN-3"

          echo "Instance was not created in this cycle. The schedule will try again."
