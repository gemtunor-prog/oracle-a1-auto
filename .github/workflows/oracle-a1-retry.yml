name: Oracle A1 Auto Retry

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: oracle-a1-auto-retry
  cancel-in-progress: false

jobs:
  create-oracle-a1:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Install OCI CLI
        run: |
          python -m pip install --user oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" | sed 's/\\n/\n/g' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          printf '%s' "${{ secrets.OCI_SSH_PUBLIC_KEY }}" > /tmp/sshkey.pub

      - name: Try create Oracle A1
        run: |
          set +e

          REGION="${{ secrets.OCI_REGION }}"
          DISPLAY_NAME="${{ secrets.OCI_DISPLAY_NAME }}"
          OCPUS="${{ secrets.OCI_OCPUS }}"
          MEMORY="${{ secrets.OCI_MEMORY_GB }}"

          if [ -z "$REGION" ]; then REGION="sa-saopaulo-1"; fi
          if [ -z "$DISPLAY_NAME" ]; then DISPLAY_NAME="oracle-a1-auto"; fi
          if [ -z "$OCPUS" ]; then OCPUS="1"; fi
          if [ -z "$MEMORY" ]; then MEMORY="6"; fi

          SHAPE="VM.Standard.A1.Flex"
          SHAPE_CONFIG="{\"ocpus\":${OCPUS},\"memoryInGBs\":${MEMORY}}"

          send_telegram() {
            if [ -n "${{ secrets.TG_BOT_TOKEN }}" ] && [ -n "${{ secrets.TG_CHAT_ID }}" ]; then
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TG_CHAT_ID }}" \
                --data-urlencode text="$1" > /dev/null
            fi
          }

          check_existing() {
            EXISTING=$(oci compute instance list \
              --region "$REGION" \
              --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
              --display-name "$DISPLAY_NAME" \
              --lifecycle-state RUNNING \
              --query "data[0].id" \
              --raw-output 2>/dev/null)

            if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
              echo "Já existe VM rodando: $EXISTING"
              exit 0
            fi
          }

          try_launch() {
            FD="$1"

            echo "Tentando criar VM. Fault Domain: ${FD:-nenhum}"

            CMD="oci compute instance launch \
              --region $REGION \
              --availability-domain '${{ secrets.OCI_AD }}' \
              --compartment-id '${{ secrets.OCI_COMPARTMENT_ID }}' \
              --shape $SHAPE \
              --shape-config '$SHAPE_CONFIG' \
              --subnet-id '${{ secrets.OCI_SUBNET_ID }}' \
              --image-id '${{ secrets.OCI_IMAGE_ID }}' \
              --ssh-authorized-keys-file /tmp/sshkey.pub \
              --assign-public-ip true \
              --display-name '$DISPLAY_NAME' \
              --query 'data.id' \
              --raw-output"

            if [ -n "$FD" ]; then
              CMD="$CMD --fault-domain $FD"
            fi

            OUT=$(eval "$CMD" 2>&1)
            CODE=$?

            echo "$OUT"

            if [ $CODE -eq 0 ] && echo "$OUT" | grep -q "ocid1.instance"; then
              send_telegram "✅ Oracle A1 criada com sucesso!
Nome: $DISPLAY_NAME
FD: ${FD:-sem fault domain}
Instance:
$OUT"
              exit 0
            fi

            if echo "$OUT" | grep -Eiq "Out of capacity|Out of host capacity|capacity"; then
              echo "Sem capacidade ainda."
              return 0
            fi

            if echo "$OUT" | grep -Eiq "NotAuthorized|Authorization|InvalidParameter|LimitExceeded|quota"; then
              send_telegram "⚠️ Erro diferente na Oracle:
$OUT"
              return 0
            fi
          }

          check_existing

          try_launch ""
          sleep 5
          try_launch "FAULT-DOMAIN-1"
          sleep 5
          try_launch "FAULT-DOMAIN-2"
          sleep 5
          try_launch "FAULT-DOMAIN-3"

          echo "Não conseguiu agora. Vai tentar no próximo ciclo."
