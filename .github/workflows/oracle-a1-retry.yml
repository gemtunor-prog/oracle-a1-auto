name: Oracle A1 Auto Retry

on:
  workflow_dispatch:
    inputs:
      ocpus:
        description: "OCPUs da A1 Flex"
        required: false
        default: ""
      memory_gb:
        description: "RAM em GB da A1 Flex"
        required: false
        default: ""
  push:
    branches:
      - main
    paths-ignore:
      - ".github/oracle-a1-state.json"
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: oracle-a1-auto-retry
  cancel-in-progress: false

jobs:
  create-oracle-a1:
    name: Try create Oracle A1
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OCI CLI
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user --upgrade oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/oci" --version

      - name: Configure OCI
        shell: bash
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          missing=0
          for name in OCI_USER_OCID OCI_TENANCY_OCID OCI_FINGERPRINT OCI_PRIVATE_KEY OCI_REGION OCI_SSH_PUBLIC_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing secret::$name is empty or not configured."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          mkdir -p "$HOME/.oci"

          printf '%s' "$OCI_PRIVATE_KEY" | sed 's/\\n/\n/g' > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"

          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          key_file=${HOME}/.oci/oci_api_key.pem
          EOF

          chmod 600 "$HOME/.oci/config"
          printf '%s' "$OCI_SSH_PUBLIC_KEY" > /tmp/sshkey.pub

          oci iam region list --auth api_key --output table >/dev/null
          echo "OCI CLI configured."

      - name: Try create Oracle A1 Flex instance
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_AD: ${{ secrets.OCI_AD }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_DISPLAY_NAME: ${{ secrets.OCI_DISPLAY_NAME }}
          SECRET_OCPUS: ${{ secrets.OCI_OCPUS }}
          SECRET_MEMORY_GB: ${{ secrets.OCI_MEMORY_GB }}
          INPUT_OCPUS: ${{ github.event.inputs.ocpus || '' }}
          INPUT_MEMORY_GB: ${{ github.event.inputs.memory_gb || '' }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set +e
          set -uo pipefail

          SHAPE="VM.Standard.A1.Flex"
          DISPLAY_NAME="${OCI_DISPLAY_NAME:-oracle-a1-auto}"
          OCPUS="${INPUT_OCPUS:-${SECRET_OCPUS:-1}}"
          MEMORY_GB="${INPUT_MEMORY_GB:-${SECRET_MEMORY_GB:-6}}"
          START_TS="$(date +%s)"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          CYCLE_NUMBER="${GITHUB_RUN_NUMBER:-0}"
          STATE_FILE=".github/oracle-a1-state.json"
          TZ_NAME="America/Cuiaba"
          ATTEMPTS=0
          CAPACITY_ERRORS=0
          OTHER_ERRORS=0
          LAST_RESULT="not-started"

          elapsed_seconds() {
            echo "$(($(date +%s) - START_TS))"
          }

          format_time() {
            TZ="$TZ_NAME" date -d "@$1" "+%d/%m/%Y %H:%M:%S %Z" 2>/dev/null || date -u -d "@$1" "+%Y-%m-%d %H:%M:%S UTC"
          }

          load_state_env() {
            python3 - <<'PY' > /tmp/oracle-a1-state.env
          import json
          from pathlib import Path

          path = Path(".github/oracle-a1-state.json")
          state = {}
          if path.exists():
              try:
                  state = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  state = {}

          def number(name, default=0):
              value = state.get(name, default)
              try:
                  if isinstance(value, float) and value.is_integer():
                      value = int(value)
                  return value
              except Exception:
                  return default

          print(f'PREVIOUS_RECORDED_CYCLES={int(number("total_cycles", 0))}')
          print(f'PREVIOUS_RECORDED_TESTS={int(number("total_tests", 0))}')
          print(f'AVG_DURATION_SECONDS={float(number("avg_duration_seconds", 0))}')
          print(f'AVG_START_GAP_SECONDS={float(number("avg_start_gap_seconds", 0))}')
          print(f'LAST_STARTED_EPOCH={int(number("last_started_epoch", 0))}')
          PY
            . /tmp/oracle-a1-state.env
          }

          predict_next_start_epoch() {
            local now_ts
            local predicted
            now_ts="$(date +%s)"
            predicted="$(python3 - <<PY
          import math
          start = int("$START_TS")
          now = int("$now_ts")
          avg_gap = float("${AVG_START_GAP_SECONDS:-0}")

          if avg_gap > 0:
              predicted = start + max(300, int(round(avg_gap)))
          else:
              predicted = ((now + 299) // 300) * 300

          if predicted <= now:
              predicted = ((now + 299) // 300) * 300

          print(predicted)
          PY
          )"
            echo "$predicted"
          }

          update_state() {
            local result="$1"
            local duration
            local finished_ts

            duration="$(elapsed_seconds)"
            finished_ts="$(date +%s)"

            RESULT="$result" \
            ATTEMPTS="$ATTEMPTS" \
            CAPACITY_ERRORS="$CAPACITY_ERRORS" \
            OTHER_ERRORS="$OTHER_ERRORS" \
            START_TS="$START_TS" \
            FINISHED_TS="$finished_ts" \
            DURATION_SECONDS="$duration" \
            RUN_ID="${GITHUB_RUN_ID:-}" \
            RUN_NUMBER="${GITHUB_RUN_NUMBER:-}" \
            RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-}" \
            EVENT_NAME="${EVENT_NAME:-}" \
            python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(".github/oracle-a1-state.json")
          path.parent.mkdir(parents=True, exist_ok=True)

          state = {}
          if path.exists():
              try:
                  state = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  state = {}

          def as_int(name, default=0):
              try:
                  return int(float(state.get(name, default) or default))
              except Exception:
                  return default

          def as_float(name, default=0.0):
              try:
                  return float(state.get(name, default) or default)
              except Exception:
                  return default

          def ewma(previous, current, alpha=0.35):
              if previous <= 0:
                  return float(current)
              return (alpha * float(current)) + ((1 - alpha) * float(previous))

          start = int(os.environ["START_TS"])
          finished = int(os.environ["FINISHED_TS"])
          duration = int(os.environ["DURATION_SECONDS"])
          attempts = int(os.environ["ATTEMPTS"])
          capacity_errors = int(os.environ["CAPACITY_ERRORS"])
          other_errors = int(os.environ["OTHER_ERRORS"])
          last_started = as_int("last_started_epoch", 0)
          observed_gap = start - last_started if last_started > 0 else 0

          total_cycles = as_int("total_cycles", 0) + 1
          total_tests = as_int("total_tests", 0) + attempts
          avg_duration = ewma(as_float("avg_duration_seconds", 0), duration)
          avg_gap = as_float("avg_start_gap_seconds", 0)
          if observed_gap > 0:
              avg_gap = ewma(avg_gap, observed_gap)

          state.update({
              "total_cycles": total_cycles,
              "total_tests": total_tests,
              "avg_duration_seconds": round(avg_duration, 2),
              "avg_start_gap_seconds": round(avg_gap, 2),
              "last_started_epoch": start,
              "last_finished_epoch": finished,
              "last_duration_seconds": duration,
              "last_observed_start_gap_seconds": observed_gap,
              "last_result": os.environ["RESULT"],
              "last_attempts": attempts,
              "last_capacity_errors": capacity_errors,
              "last_other_errors": other_errors,
              "last_run_id": os.environ.get("RUN_ID", ""),
              "last_run_number": os.environ.get("RUN_NUMBER", ""),
              "last_run_attempt": os.environ.get("RUN_ATTEMPT", ""),
              "last_event": os.environ.get("EVENT_NAME", ""),
          })

          path.write_text(json.dumps(state, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

            if git diff --quiet -- "$STATE_FILE" && [ -z "$(git ls-files --others --exclude-standard "$STATE_FILE")" ]; then
              return 0
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$STATE_FILE"
            git commit -m "Update Oracle A1 retry state [skip ci]" || true
            git pull --rebase origin main || true
            git push origin HEAD:main || true
          }

          load_state_env
          PREDICTED_NEXT_START_TS="$(predict_next_start_epoch)"
          PREDICTED_NEXT_START="$(format_time "$PREDICTED_NEXT_START_TS")"
          TOTAL_RECORDED_CYCLES="${PREVIOUS_RECORDED_CYCLES:-0}"
          TOTAL_RECORDED_TESTS="${PREVIOUS_RECORDED_TESTS:-0}"

          send_telegram() {
            local text="$1"
            local response_file
            local http_code

            if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
              echo "::warning::Telegram secrets TG_BOT_TOKEN or TG_CHAT_ID are empty."
              return 0
            fi

            response_file="$(mktemp)"

            if ! http_code="$(curl -sS -o "$response_file" -w "%{http_code}" \
              -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${text}")"; then
              echo "::warning::Telegram request failed before receiving an HTTP response."
              cat "$response_file" || true
              rm -f "$response_file"
              return 0
            fi

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "Telegram notification sent."
            else
              echo "::warning::Telegram notification failed with HTTP $http_code."
              cat "$response_file" || true
            fi

            rm -f "$response_file"
          }

          send_telegram_lines() {
            local text
            text="$(printf '%s\n' "$@")"
            send_telegram "$text"
          }

          fail_required() {
            local message="$1"
            echo "::error::$message"
            update_state "configuration-error"
            load_state_env
            PREDICTED_NEXT_START_TS="$(predict_next_start_epoch)"
            PREDICTED_NEXT_START="$(format_time "$PREDICTED_NEXT_START_TS")"
            send_telegram_lines \
              "❌ Oracle Auto: erro de configuração" \
              "Status: $message" \
              "Ciclo: #${CYCLE_NUMBER}" \
              "Ciclos registrados: ${PREVIOUS_RECORDED_CYCLES}" \
              "Testes registrados: ${PREVIOUS_RECORDED_TESTS}" \
              "Tempo: $(elapsed_seconds)s" \
              "Próximo teste estimado: $PREDICTED_NEXT_START" \
              "Run: $RUN_URL"
            exit 1
          }

          for name in OCI_COMPARTMENT_ID OCI_AD OCI_SUBNET_ID OCI_REGION; do
            if [ -z "${!name:-}" ]; then
              fail_required "$name is empty or not configured."
            fi
          done

          if [ ! -s /tmp/sshkey.pub ]; then
            fail_required "OCI_SSH_PUBLIC_KEY is empty or not configured."
          fi

          if ! [[ "$OCPUS" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            fail_required "OCI_OCPUS/input ocpus must be numeric. Current value: $OCPUS"
          fi

          if ! [[ "$MEMORY_GB" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            fail_required "OCI_MEMORY_GB/input memory_gb must be numeric. Current value: $MEMORY_GB"
          fi

          SHAPE_CONFIG="{\"ocpus\":${OCPUS},\"memoryInGBs\":${MEMORY_GB}}"

          send_telegram_lines \
            "🚀 Oracle Auto: ciclo iniciado" \
            "Evento: ${EVENT_NAME}" \
            "Ciclo: #${CYCLE_NUMBER} tentativa GitHub ${GITHUB_RUN_ATTEMPT}" \
            "Nome: $DISPLAY_NAME" \
              "Shape: $SHAPE" \
              "OCPUs/RAM: ${OCPUS}/${MEMORY_GB}GB" \
              "Agenda: tenta automaticamente a cada 5 minutos quando o GitHub liberar o runner" \
              "Próximo teste estimado: $PREDICTED_NEXT_START" \
              "Ciclos registrados: ${TOTAL_RECORDED_CYCLES}" \
              "Testes registrados: ${TOTAL_RECORDED_TESTS}" \
              "Média de duração: ${AVG_DURATION_SECONDS}s" \
              "Média entre inícios: ${AVG_START_GAP_SECONDS}s" \
              "Run: $RUN_URL"

          echo "Region: $OCI_REGION"
          echo "Display name: $DISPLAY_NAME"
          echo "Shape: $SHAPE"
          echo "OCPUs: $OCPUS"
          echo "Memory: ${MEMORY_GB}GB"

          echo "Checking for an existing running instance with the same display name..."
          EXISTING_RUNNING=$(oci compute instance list \
            --region "$OCI_REGION" \
            --compartment-id "$OCI_COMPARTMENT_ID" \
            --display-name "$DISPLAY_NAME" \
            --lifecycle-state RUNNING \
            --query "data[0].id" \
            --raw-output 2>/dev/null || true)

          if [ -n "$EXISTING_RUNNING" ] && [ "$EXISTING_RUNNING" != "null" ]; then
            echo "Instance already running: $EXISTING_RUNNING"
            update_state "already-running"
            load_state_env
            PREDICTED_NEXT_START_TS="$(predict_next_start_epoch)"
            PREDICTED_NEXT_START="$(format_time "$PREDICTED_NEXT_START_TS")"
            send_telegram_lines \
              "✅ Oracle Auto: VM já está rodando" \
              "Nome: $DISPLAY_NAME" \
              "Ciclo: #${CYCLE_NUMBER}" \
              "Testes neste ciclo: 0" \
              "Ciclos registrados: ${PREVIOUS_RECORDED_CYCLES}" \
              "Testes registrados: ${PREVIOUS_RECORDED_TESTS}" \
              "Tempo: $(elapsed_seconds)s" \
              "Próximo teste estimado: $PREDICTED_NEXT_START" \
              "Instance OCID:" \
              "$EXISTING_RUNNING" \
              "Run: $RUN_URL"
            exit 0
          fi

          EXISTING_PROVISIONING=$(oci compute instance list \
            --region "$OCI_REGION" \
            --compartment-id "$OCI_COMPARTMENT_ID" \
            --display-name "$DISPLAY_NAME" \
            --lifecycle-state PROVISIONING \
            --query "data[0].id" \
            --raw-output 2>/dev/null || true)

          if [ -n "$EXISTING_PROVISIONING" ] && [ "$EXISTING_PROVISIONING" != "null" ]; then
            echo "Instance already provisioning: $EXISTING_PROVISIONING"
            update_state "already-provisioning"
            load_state_env
            PREDICTED_NEXT_START_TS="$(predict_next_start_epoch)"
            PREDICTED_NEXT_START="$(format_time "$PREDICTED_NEXT_START_TS")"
            send_telegram_lines \
              "⏳ Oracle Auto: VM já está provisionando" \
              "Nome: $DISPLAY_NAME" \
              "Ciclo: #${CYCLE_NUMBER}" \
              "Ciclos registrados: ${PREVIOUS_RECORDED_CYCLES}" \
              "Testes registrados: ${PREVIOUS_RECORDED_TESTS}" \
              "Tempo: $(elapsed_seconds)s" \
              "Próximo teste estimado: $PREDICTED_NEXT_START" \
              "Instance OCID:" \
              "$EXISTING_PROVISIONING" \
              "Run: $RUN_URL"
            exit 0
          fi

          find_platform_image() {
            local version="$1"

            oci compute image list \
              --region "$OCI_REGION" \
              --compartment-id "$OCI_COMPARTMENT_ID" \
              --operating-system "Oracle Linux" \
              --operating-system-version "$version" \
              --shape "$SHAPE" \
              --sort-by TIMECREATED \
              --sort-order DESC \
              --query "data[0].id" \
              --raw-output 2>/tmp/image_error.log || true
          }

          IMAGE_ID="${OCI_IMAGE_ID:-}"

          if [ -z "$IMAGE_ID" ]; then
            echo "OCI_IMAGE_ID not configured. Searching for an Oracle Linux 9 A1-compatible image..."
            IMAGE_ID="$(find_platform_image "9")"

            if [ -z "$IMAGE_ID" ] || [ "$IMAGE_ID" = "null" ]; then
              echo "Oracle Linux 9 image not found. Trying Oracle Linux 8..."
              IMAGE_ID="$(find_platform_image "8")"
            fi

            if [ -z "$IMAGE_ID" ] || [ "$IMAGE_ID" = "null" ]; then
              echo "Could not find an Oracle Linux 9 or 8 A1-compatible image."
              cat /tmp/image_error.log || true
              update_state "image-not-found"
              load_state_env
              PREDICTED_NEXT_START_TS="$(predict_next_start_epoch)"
              PREDICTED_NEXT_START="$(format_time "$PREDICTED_NEXT_START_TS")"
              send_telegram_lines \
                "❌ Oracle Auto: erro ao buscar imagem" \
                "Resultado: não encontrou Oracle Linux 9 ou 8 compatível com $SHAPE" \
                "Ciclo: #${CYCLE_NUMBER}" \
                "Ciclos registrados: ${PREVIOUS_RECORDED_CYCLES}" \
                "Testes registrados: ${PREVIOUS_RECORDED_TESTS}" \
                "Tempo: $(elapsed_seconds)s" \
                "Próximo teste estimado: $PREDICTED_NEXT_START" \
                "Run: $RUN_URL"
              exit 1
            fi
          fi

          echo "Image ID: $IMAGE_ID"

          try_launch() {
            local fault_domain="${1:-}"
            local output
            local code

            ATTEMPTS=$((ATTEMPTS + 1))
            echo "Trying to create instance. Fault domain: ${fault_domain:-none}"

            args=(
              compute instance launch
              --region "$OCI_REGION"
              --availability-domain "$OCI_AD"
              --compartment-id "$OCI_COMPARTMENT_ID"
              --shape "$SHAPE"
              --shape-config "$SHAPE_CONFIG"
              --subnet-id "$OCI_SUBNET_ID"
              --image-id "$IMAGE_ID"
              --ssh-authorized-keys-file /tmp/sshkey.pub
              --assign-public-ip true
              --display-name "$DISPLAY_NAME"
              --query "data.id"
              --raw-output
            )

            if [ -n "$fault_domain" ]; then
              args+=(--fault-domain "$fault_domain")
            fi

            output="$(oci "${args[@]}" 2>&1)"
            code=$?

            echo "$output"

            if [ "$code" -eq 0 ] && echo "$output" | grep -q "ocid1.instance"; then
              update_state "created"
              load_state_env
              PREDICTED_NEXT_START_TS="$(predict_next_start_epoch)"
              PREDICTED_NEXT_START="$(format_time "$PREDICTED_NEXT_START_TS")"
              send_telegram_lines \
                "✅ Oracle Auto: A1 criada com sucesso" \
                "Nome: $DISPLAY_NAME" \
                "Shape: $SHAPE" \
                "OCPUs/RAM: ${OCPUS}/${MEMORY_GB}GB" \
                "Fault domain: ${fault_domain:-none}" \
                "Ciclo: #${CYCLE_NUMBER}" \
                "Teste que funcionou: ${ATTEMPTS}/4" \
                "Ciclos registrados: ${PREVIOUS_RECORDED_CYCLES}" \
                "Testes registrados: ${PREVIOUS_RECORDED_TESTS}" \
                "Tempo: $(elapsed_seconds)s" \
                "Próximo teste estimado: $PREDICTED_NEXT_START" \
                "Instance OCID:" \
                "$output" \
                "Run: $RUN_URL"
              exit 0
            fi

            if echo "$output" | grep -Eiq "Out of capacity|Out of host capacity|capacity"; then
              echo "No capacity available yet."
              CAPACITY_ERRORS=$((CAPACITY_ERRORS + 1))
              LAST_RESULT="no-capacity"
              return 0
            fi

            if echo "$output" | grep -Eiq "NotAuthorized|Authorization|InvalidParameter|LimitExceeded|quota|ServiceError|Forbidden|FaultDomain"; then
              OTHER_ERRORS=$((OTHER_ERRORS + 1))
              LAST_RESULT="error"
              echo "Non-capacity error detected."
              return 0
            fi

            OTHER_ERRORS=$((OTHER_ERRORS + 1))
            LAST_RESULT="unknown-error"
            return 0
          }

          try_launch ""
          sleep 5

          try_launch "FAULT-DOMAIN-1"
          sleep 5

          try_launch "FAULT-DOMAIN-2"
          sleep 5

          try_launch "FAULT-DOMAIN-3"

          echo "Instance was not created in this cycle. The schedule will try again."
          update_state "$LAST_RESULT"
          load_state_env
          PREDICTED_NEXT_START_TS="$(predict_next_start_epoch)"
          PREDICTED_NEXT_START="$(format_time "$PREDICTED_NEXT_START_TS")"

          if [ "$LAST_RESULT" = "no-capacity" ] && [ "$OTHER_ERRORS" -eq 0 ]; then
            send_telegram_lines \
              "🟡 Oracle Auto: sem capacidade agora" \
              "Resultado: Oracle retornou Out of host capacity" \
              "Nome: $DISPLAY_NAME" \
              "Ciclo: #${CYCLE_NUMBER}" \
              "Testes neste ciclo: ${ATTEMPTS}/4" \
              "Sem capacidade: ${CAPACITY_ERRORS}" \
              "Outros erros: ${OTHER_ERRORS}" \
              "Ciclos registrados: ${PREVIOUS_RECORDED_CYCLES}" \
              "Testes registrados: ${PREVIOUS_RECORDED_TESTS}" \
              "Tempo: $(elapsed_seconds)s" \
              "Média de duração: ${AVG_DURATION_SECONDS}s" \
              "Média entre inícios: ${AVG_START_GAP_SECONDS}s" \
              "Próximo teste estimado: $PREDICTED_NEXT_START" \
              "Obs: o GitHub pode atrasar ou enfileirar, a previsão melhora a cada ciclo" \
              "Run: $RUN_URL"
          else
            send_telegram_lines \
              "🔴 Oracle Auto: ciclo terminou com erro" \
              "Resultado: $LAST_RESULT" \
              "Nome: $DISPLAY_NAME" \
              "Ciclo: #${CYCLE_NUMBER}" \
              "Testes neste ciclo: ${ATTEMPTS}/4" \
              "Sem capacidade: ${CAPACITY_ERRORS}" \
              "Outros erros: ${OTHER_ERRORS}" \
              "Ciclos registrados: ${PREVIOUS_RECORDED_CYCLES}" \
              "Testes registrados: ${PREVIOUS_RECORDED_TESTS}" \
              "Tempo: $(elapsed_seconds)s" \
              "Média de duração: ${AVG_DURATION_SECONDS}s" \
              "Média entre inícios: ${AVG_START_GAP_SECONDS}s" \
              "Próximo teste estimado: $PREDICTED_NEXT_START" \
              "Veja o log completo no GitHub Actions" \
              "Run: $RUN_URL"
          fi
